<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS Dashboard & Cloud Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container, .form-container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h3 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        #mainBtn { background: #007bff; color: white; }
        #mainBtn:hover { background: #0056b3; }
        #mainBtn:disabled { background: #ccc; }
        #feed { width: 100%; max-width: 500px; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; margin-top: 10px; }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Опубликовать в облако</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Отправить данные</button>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // --- КОНФИГУРАЦИЯ ---
        const firebaseConfig = {
            apiKey: "AIzaSyDgUxR0Txafc_qA-rpdSzKn33265IfxsHU",
            authDomain: "qazaq-a072e.firebaseapp.com",
            projectId: "qazaq-a072e",
            storageBucket: "qazaq-a072e.firebasestorage.app",
            messagingSenderId: "47025480090",
            appId: "1:47025480090:web:3dd74ff29bc0c149f39a23",
            measurementId: "G-9TE97NWMB9"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ЭЛЕМЕНТЫ DOM ---
        const feedContainer = document.getElementById('feed');
        const mainBtn = document.getElementById('mainBtn');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');

        // --- МЕТОДЫ ---

        // Глобальная функция для лайков
        window.processLike = async (id) => {
            try {
                const docRef = doc(db, "requests", id);
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Ошибка при лайке:", e.message);
            }
        };

        // Создание записи
        mainBtn.onclick = async () => {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            if (!name || !email) return alert("Заполните все поля");

            mainBtn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name,
                    email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                nameInput.value = "";
                emailInput.value = "";
            } catch (e) {
                alert("Ошибка безопасности: Данные отклонены сервером.");
                console.error(e);
            } finally {
                mainBtn.disabled = false;
            }
        };

        // Реал-тайм обновление ленты
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleString() : '...';
                
                const postElement = document.createElement('div');
                postElement.className = 'post';
                postElement.innerHTML = `
                    <span class="time">${date}</span>
                    <b>${escapeHtml(data.name)}</b>
                    <p style="margin: 5px 0;">${escapeHtml(data.email)}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">
                        👍 ${data.likes || 0}
                    </button>
                `;
                feedContainer.appendChild(postElement);
            });
        });

        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
